<style>
  /* ---------- AmAm overrides on top of BMW M tokens ---------- */
  /* The system is pure-black + white. We borrow its bones (sharp
     rectangles, uppercase display, hairlines, M-stripe-as-accent)
     and warm the canvas a touch so it reads "barbershop" not
     "luxury car configurator". The tricolor stripe doubles
     beautifully as a barber pole reference (red/white/blue). */
  :root {
    /* White canvas with warm light surfaces */
    --color-canvas: #ffffff;
    --color-surface-soft: #f5f4f2;
    --color-surface-card: #eeecea;
    --color-surface-elevated: #e5e2de;
    --color-hairline: #e0ddd8;
    --color-body: #555550;
    --color-body-strong: #1a1816;
    --color-muted: #6b6b67;
    /* Barber pole — pure red and royal blue */
    --color-pole-red: #c8231a;
    --color-pole-blue: #1340a6;
    /* Accent / CTA color — barber blue, 9.5:1 on white */
    --color-cream: #1340a6;
    --gradient-m-stripe: linear-gradient(
      90deg,
      var(--color-pole-red) 0%,
      var(--color-pole-red) 33.33%,
      var(--color-canvas) 33.33%,
      var(--color-canvas) 66.66%,
      var(--color-pole-blue) 66.66%,
      var(--color-pole-blue) 100%
    );
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--color-canvas);
    color: var(--color-on-dark);
    overflow-x: hidden;
    /* breathing room for sticky bottom bar on mobile */
    padding-bottom: env(safe-area-inset-bottom);
  }

  img, svg { max-width: 100%; display: block; }

  /* Scoping helpers — mobile-first */
  .container {
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 20px;
  }
  @media (min-width: 760px) { .container { padding: 0 40px; } }
  @media (min-width: 1100px) { .container { padding: 0 64px; } }

  /* Make sure long words don't blow the layout on phones */
  h1, h2, h3 { word-break: break-word; overflow-wrap: anywhere; }

  /* Reduced-motion: kill anything that moves */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0s !important;
      transition-duration: 0s !important;
    }
  }

  /* Focus-visible outline for AA */
  :focus-visible {
    outline: 3px solid var(--color-cream);
    outline-offset: 3px;
  }

  /* Skip link */
  .skip-link {
    position: absolute;
    top: -100px;
    left: 0;
    background: var(--color-cream);
    color: #fff;
    padding: 12px 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 14px;
    z-index: 1000;
  }
  .skip-link:focus { top: 0; }
</style>
